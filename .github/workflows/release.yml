name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev
      - run: flutter build linux --release
        working-directory: app
      - run: tar -czf plapper-linux-x64.tar.gz -C app/build/linux/x64/release bundle
      - uses: softprops/action-gh-release@v2
        with:
          files: plapper-linux-x64.tar.gz

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter build windows --release
        working-directory: app
      - run: Compress-Archive -Path app/build/windows/x64/runner/Release/* -DestinationPath plapper-windows-x64.zip
      - name: Build NSIS installer
        run: |
          choco install nsis -y --no-progress
          & "$env:ProgramData\chocolatey\bin\makensis.exe" /DBUNDLE=app\build\windows\x64\runner\Release installer\windows.nsi
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            plapper-windows-x64.zip
            plapper-setup-windows-x64.exe

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter build macos --release
        working-directory: app
      - run: ditto -c -k --keepParent app/build/macos/Build/Products/Release/plapper.app plapper-macos.zip
      - name: Build DMG
        run: |
          mkdir dmg-staging
          cp -R app/build/macos/Build/Products/Release/plapper.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname plapper -srcfolder dmg-staging -ov -format UDZO plapper-macos.dmg
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            plapper-macos.zip
            plapper-macos.dmg

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter build ios --release --no-codesign
        working-directory: app
      - name: Package unsigned ipa
        run: |
          mkdir Payload
          cp -r app/build/ios/iphoneos/Runner.app Payload/
          zip -qr plapper-ios-unsigned.ipa Payload
      - uses: softprops/action-gh-release@v2
        with:
          files: plapper-ios-unsigned.ipa

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter build apk --release
        working-directory: app
      - run: cp app/build/app/outputs/flutter-apk/app-release.apk plapper-android.apk
      - uses: softprops/action-gh-release@v2
        with:
          files: plapper-android.apk
