name: core

on:
  push:
    paths: ['core/**', '.github/workflows/core.yml']
  pull_request:
    paths: ['core/**', '.github/workflows/core.yml']

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S core -B core/build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build core/build --config Release
      - name: Test
        run: ctest --test-dir core/build --output-on-failure -C Release
